name: "Setup"
description: "Restore caches, install tools, and set up the project"
inputs:
  env:
    description: "Environment variables in JSON format"
    required: true
  cache-key:
    description: "Cache key prefix"
    required: true
  github-token:
    description: "GitHub token for authenticated API requests"
    required: true
  mise-version:
    description: "Mise version to use"
    required: true
runs:
  using: "composite"
  steps:
    - name: "Create .env file"
      shell: "bash"
      env:
        GITHUB_TOKEN: "${{ inputs.github-token }}"
        ENV: "${{ inputs.env }}"
      run: |
        {
          printf "GITHUB_TOKEN=%s\n" "$GITHUB_TOKEN"
          printf "%s" "$ENV" | jq -er 'to_entries[] | "\(.key)=\(.value)"'
        } > .env
    - name: "Restore caches"
      uses: "actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae" # v5.0.5
      with:
        path: ".cache"
        key: "${{ inputs.cache-key }}-cache-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('pnpm-lock.yaml') }}"
        restore-keys: |
          ${{ inputs.cache-key }}-cache-${{ runner.os }}-${{ runner.arch }}-
    - name: "Install mise and tools"
      uses: "jdx/mise-action@1648a7812b9aeae629881980618f079932869151" # v4.0.1
      with:
        version: "${{ inputs.mise-version }}"
        cache_key_prefix: "${{ inputs.cache-key }}-mise"
    - name: "Setup project"
      shell: "bash"
      run: "mise run setup"
