name: "Build and test"
on:
  pull_request:
    types: ["opened", "reopened", "synchronize"]
    branches:
      - "main"
  push:
    branches:
      - "main"
  schedule:
    - cron: "32 4 * * *"
  workflow_dispatch: {}
permissions: {}
concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true
jobs:
  init:
    name: "Init"
    runs-on: "ubuntu-latest"
    timeout-minutes: 5
    permissions:
      contents: "read" # to fetch code
    outputs:
      cache-key: "${{ steps.init.outputs.cache-key }}"
      env: "${{ steps.init.outputs.env }}"
      test-coverage: "${{ steps.init.outputs.test-coverage }}"
      test-reports: "${{ steps.init.outputs.test-reports }}"
      mise-version: "${{ steps.init.outputs.mise-version }}"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
        with:
          ref: "${{ github.ref }}"
          fetch-depth: 1
          persist-credentials: false
      - name: "Init"
        id: "init"
        uses: "./.github/actions/init-workflow"
  build-and-test:
    name: "Build and test"
    needs: "init"
    runs-on: "ubuntu-latest"
    timeout-minutes: 15
    permissions:
      contents: "read" # to fetch code
      id-token: "write" # for OIDC authentication
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
        with:
          ref: "${{ github.ref }}"
          fetch-depth: 1
          persist-credentials: false
      - name: "Setup"
        uses: "./.github/actions/setup"
        with:
          env: "${{ needs.init.outputs.env }}"
          cache-key: "${{ needs.init.outputs.cache-key }}"
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          mise-version: "${{ needs.init.outputs.mise-version }}"
      - name: "Build and test"
        run: "mise run --force ci-test"
      - name: "Upload reports"
        if: "!cancelled()"
        uses: "./.github/actions/upload-reports"
        with:
          test-coverage: "${{ needs.init.outputs.test-coverage }}"
          test-reports: "${{ needs.init.outputs.test-reports }}"
  zizmor:
    name: "Check CI scripts"
    timeout-minutes: 15
    permissions:
      contents: "read" # to fetch code
      security-events: "write" # to upload sarif results
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
        with:
          ref: "${{ github.ref }}"
          fetch-depth: 1
          persist-credentials: false
      - name: "Run zizmor"
        uses: "zizmorcore/zizmor-action@0dce2577a4760a2749d8cfb7a84b7d5585ebcb7d" # v0.5.0
        with:
          persona: "auditor"
        env:
          GH_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
  trivy:
    name: "Security scan"
    timeout-minutes: 15
    permissions:
      contents: "read" # to fetch code
      security-events: "write" # to upload sarif results
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
        with:
          ref: "${{ github.ref }}"
          fetch-depth: 1
          persist-credentials: false
      - name: "Run Trivy vulnerability scanner"
        uses: "aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478" # v0.34.2
        with:
          trivy-config: "trivy.yaml"
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          ignore-unfixed: true
      - name: "Upload Trivy scan results to GitHub Security tab"
        uses: "github/codeql-action/upload-sarif@89a39a4e59826350b863aa6b6252a07ad50cf83e" # v4.32.4
        with:
          sarif_file: "trivy-results.sarif"
