name: "Publish attested native addon"
on:
  workflow_call:
    inputs:
      addons:
        description: >-
          Nested JSON: `{ [platform]: { [arch]: { url, bundleUrl } } }`
          using Node's process.platform / process.arch. `url` is the public
          URL the caller has already uploaded the `.node.gz` binary to;
          `bundleUrl` is the public URL its sidecar sigstore bundle is
          served at (typically the binary URL with `.sigstore` appended).
          The caller mints bundles themselves (via the `attest-addons`
          action in their own workflow), uploads both the binary and the
          bundle to their CDN / GitHub Release, then calls this workflow —
          which re-fetches both from the public URLs, verifies, writes
          the manifest, and publishes to npm.
        required: true
        type: string
      tarball-artifact:
        description: "Name of the GH artifact holding the pre-packed .tgz or .tar.gz."
        required: true
        type: string
      access:
        description: "npm publish --access (public|restricted)."
        required: false
        type: string
      tag:
        description: "npm dist-tag. Omit → latest."
        required: false
        type: string
      max-binary-bytes:
        description: "Per-binary size cap (bytes)."
        required: false
        default: 268435456
        type: number
      max-binary-seconds:
        description: "Per-binary fetch timeout (seconds)."
        required: false
        default: 300
        type: number
permissions: {}
jobs:
  publish:
    name: "Publish"
    runs-on: "ubuntu-24.04"
    timeout-minutes: 20
    permissions:
      contents: "read"
      id-token: "write" # npm trusted publishing
    steps:
      - name: "Download pre-packed tarball"
        uses: "actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53" # v6.0.0
        with:
          name: "${{ inputs.tarball-artifact }}"
          path: "./tarball"
      - name: "Set up Node.js + npm registry for trusted publishing"
        # Pinned to Node 24 LTS, whose bundled npm (≥ 11.x) already meets the
        # ≥ 11.5.1 requirement for OIDC trusted publishing. Upgrading npm in
        # place from Node 22's bundled 10.x was flaky (mid-install corruption
        # of npm's own node_modules; e.g. missing `promise-retry`), so we
        # avoid the self-upgrade entirely by choosing a Node major that
        # already ships a suitable npm. `registry-url` writes the .npmrc that
        # directs `npm publish` at npmjs.org with OIDC auth.
        uses: "actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f" # v6.3.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - name: "Extract pre-packed tarball"
        id: "extract"
        shell: "bash"
        # Exactly one gzipped tarball must be present; fail loudly
        # otherwise. Accepts both `.tgz` (npm/pnpm default) and `.tar.gz`
        # (common build-script convention) so callers don't have to
        # rename their artifact before upload. Extract into $RUNNER_TEMP;
        # subsequent steps reach the workdir via `dirname(package-dir)`.
        run: |
          set -euo pipefail
          shopt -s nullglob
          tarballs=(./tarball/*.tgz ./tarball/*.tar.gz)
          if [[ ${#tarballs[@]} -ne 1 ]]; then
            echo "expected exactly one .tgz/.tar.gz in ./tarball; found ${#tarballs[@]}" >&2
            exit 1
          fi
          workdir="$RUNNER_TEMP/slsa-publish-$$"
          mkdir -p "$workdir"
          tar -xzf "${tarballs[0]}" -C "$workdir"
          echo "package-dir=$workdir/package" >>"$GITHUB_OUTPUT"
      - name: "Read package.json fields: name, manifest path, attest workflow"
        id: "pkg"
        shell: "bash"
        env:
          PACKAGE_DIR: "${{ steps.extract.outputs.package-dir }}"
        # The default `slsa-manifest.json` matches `DEFAULT_MANIFEST_PATH`
        # in node-addon-slsa's constants.ts — the consumer-side loader
        # falls back on the same string, so drifting it here would silently
        # break installation of any package that doesn't set
        # `addon.manifest` explicitly. `addon.attestWorkflow` is required
        # (no default); it's the filename of the caller's workflow that
        # minted attestations, used to pin the Fulcio Build Signer URI.
        run: |
          set -euo pipefail
          pkg_json="$PACKAGE_DIR/package.json"
          name=$(jq -r '.name' "$pkg_json")
          manifest_rel=$(jq -r '.addon.manifest // "slsa-manifest.json"' "$pkg_json")
          attest_workflow=$(jq -r '.addon.attestWorkflow // empty' "$pkg_json")
          if [[ -z "$attest_workflow" ]]; then
            echo 'package.json is missing addon.attestWorkflow (required since v0.10)' >&2
            exit 1
          fi
          {
            echo "name=$name"
            echo "manifest-rel=$manifest_rel"
            echo "attest-workflow=$attest_workflow"
          } >>"$GITHUB_OUTPUT"
      - name: "Verify addons (sigstore) and build SLSA manifest"
        id: "verify"
        # Cross-repo `uses:` avoids the reusable-workflow self-location
        # problem: `github.workflow_ref`/`workflow_sha` resolve to the caller
        # inside `workflow_call`, so there's no context variable for the
        # callee's own ref. Pinned to a release sha because GHA org policy
        # enforces "full-length commit SHA" pins at runtime (not just lint),
        # ruling out tag refs like `@v0.9.0`, and a commit can't contain
        # its own sha. When the action code changes, bump in two commits:
        # first the action change (tag it), then update this sha to the
        # new commit.
        uses: "vadimpiven/node-addon-slsa/.github/actions/verify-addons@7c57383ec4db05c000363c2c694cd5b1e2074c44" # v0.10.0
        with:
          package-name: "${{ steps.pkg.outputs.name }}"
          addons: "${{ inputs.addons }}"
          attest-workflow: "${{ steps.pkg.outputs.attest-workflow }}"
          max-binary-bytes: "${{ inputs.max-binary-bytes }}"
          max-binary-seconds: "${{ inputs.max-binary-seconds }}"
      - name: "Embed SLSA manifest"
        shell: "bash"
        env:
          MANIFEST: "${{ steps.verify.outputs.manifest }}"
          MANIFEST_REL: "${{ steps.pkg.outputs.manifest-rel }}"
          PACKAGE_DIR: "${{ steps.extract.outputs.package-dir }}"
        # Two guards before writing:
        #   1. Traversal: `realpath -m` canonicalises the target (even if it
        #      doesn't exist yet); it must stay inside the canonical package
        #      dir. Blocks `addon.manifest: "../escape.json"`.
        #   2. Overwrite: pre-packed tarballs must not ship a manifest
        #      (fix caller's "files"/"npmignore" if this fires).
        run: |
          set -euo pipefail
          pkg_abs=$(realpath "$PACKAGE_DIR")
          manifest_abs=$(realpath -m "$pkg_abs/$MANIFEST_REL")
          case "$manifest_abs/" in
            "$pkg_abs"/*) ;;
            *) echo "addon.manifest escapes package dir: $MANIFEST_REL" >&2; exit 1 ;;
          esac
          if [[ -e "$manifest_abs" ]]; then
            echo "refusing to overwrite existing $manifest_abs" >&2
            exit 1
          fi
          mkdir -p "$(dirname "$manifest_abs")"
          printf '%s\n' "$MANIFEST" > "$manifest_abs"
      - name: "Repack tarball deterministically"
        id: "repack"
        shell: "bash"
        env:
          PACKAGE_DIR: "${{ steps.extract.outputs.package-dir }}"
        # Deterministic flags (GNU tar on GHA runners) → identical inputs
        # produce byte-identical tarballs, so auditors can reproduce the
        # published artifact. `npm publish` re-hashes for `dist.integrity`,
        # so determinism here is defense-in-depth rather than load-bearing.
        run: |
          set -euo pipefail
          workdir=$(dirname "$PACKAGE_DIR")
          out="$workdir/package.tgz"
          tar \
            --format=ustar \
            --sort=name \
            --mtime=@1 \
            --owner=0 \
            --group=0 \
            --numeric-owner \
            -czf "$out" \
            -C "$workdir" \
            package
          echo "tarball=$out" >>"$GITHUB_OUTPUT"
      - name: "npm publish (trusted publishing via OIDC)"
        shell: "bash"
        env:
          TARBALL: "${{ steps.repack.outputs.tarball }}"
          ACCESS: "${{ inputs.access }}"
          TAG: "${{ inputs.tag }}"
        run: |
          set -euo pipefail
          args=(publish "$TARBALL")
          [[ -n "$ACCESS" ]] && args+=(--access "$ACCESS")
          [[ -n "$TAG"    ]] && args+=(--tag    "$TAG")
          npm "${args[@]}"
