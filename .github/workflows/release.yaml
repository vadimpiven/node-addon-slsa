name: "Build and publish"
on:
  push:
    tags:
      - "v*"
permissions: {}
concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true
jobs:
  init:
    name: "Init"
    runs-on: "ubuntu-24.04"
    timeout-minutes: 5
    permissions:
      contents: "read" # to fetch code
    outputs:
      cache-key: "${{ steps.init.outputs.cache-key }}"
      env: "${{ steps.init.outputs.env }}"
      mise-version: "${{ steps.init.outputs.mise-version }}"
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
        with:
          ref: "${{ github.ref }}"
          fetch-depth: 1
          persist-credentials: false
      - name: "Verify tag is on main"
        env:
          GH_TOKEN: "${{ github.token }}"
          GH_REPOSITORY: "${{ github.repository }}"
        run: |
          set -euo pipefail
          STATUS=$(gh api "repos/$GH_REPOSITORY/compare/main...$GITHUB_SHA" --jq '.status')
          case "$STATUS" in
            behind|identical) echo "Tag $GITHUB_REF_NAME is on main (status: $STATUS)" ;;
            *) echo "::error::Tag must point to a commit on main (got status: ${STATUS:-empty})"; exit 1 ;;
          esac
      - name: "Init"
        id: "init"
        uses: "./.github/actions/init-workflow"
  build:
    name: "Build"
    needs: "init"
    runs-on: "ubuntu-24.04"
    timeout-minutes: 15
    permissions:
      contents: "write" # for release creation
      id-token: "write" # for OIDC authentication
      attestations: "write" # for build provenance
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
        with:
          ref: "${{ github.ref }}"
          fetch-depth: 1
          persist-credentials: false
      - name: "Setup"
        uses: "./.github/actions/setup"
        with:
          env: "${{ needs.init.outputs.env }}"
          cache-key: "${{ needs.init.outputs.cache-key }}"
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          mise-version: "${{ needs.init.outputs.mise-version }}"
      - name: "Build and pack package"
        run: |
          pnpm -F "{package}" run bump-version "${GITHUB_REF_NAME#v}"
          pnpm -F "{package}" run build
      - name: "Attest build provenance"
        uses: "actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26" # v4.1.0
        with:
          subject-path: "package/package.tar.gz"
      - name: "Attest SBOM"
        uses: "actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26" # v4.1.0
        with:
          subject-path: "package/package.tar.gz"
          sbom-path: "package/dist/cyclonedx/bom.json"
      - name: "Upload docs artifact"
        uses: "actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b" # v4.0.0
        with:
          path: "package/docs"
      - name: "Create release"
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: >-
          gh release create "$GITHUB_REF_NAME"
          package/package.tar.gz
          package/dist/cyclonedx/bom.json
          --generate-notes
  publish:
    name: "Publish"
    needs: "build"
    if: "needs.build.result == 'success'"
    runs-on: "ubuntu-24.04"
    timeout-minutes: 15
    permissions:
      contents: "read" # to fetch code
      id-token: "write" # for OIDC authentication
    steps:
      - name: "Checkout"
        uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2
        with:
          ref: "${{ github.ref }}"
          fetch-depth: 1
          persist-credentials: false
      - name: "Install latest Node.js with correct .npmrc"
        uses: "actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f" # v6.3.0
        with:
          node-version: "latest"
          check-latest: true
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false
      - name: "Update npm CLI"
        run: "npm install -g npm@latest"
      - name: "Download release artifact"
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        run: 'gh release download "$GITHUB_REF_NAME" --pattern "package.tar.gz"'
      - name: "Publish to npmjs.org"
        run: 'npm publish "package.tar.gz" --access public --provenance'
  docs:
    name: "Deploy docs"
    needs: "publish"
    if: "needs.publish.result == 'success'"
    runs-on: "ubuntu-24.04"
    timeout-minutes: 5
    permissions:
      pages: "write" # to deploy to GitHub Pages
      id-token: "write" # to verify the deployment originates from an appropriate source
    environment:
      name: "github-pages"
      url: "${{ steps.deploy.outputs.page_url }}"
    steps:
      - name: "Deploy to GitHub Pages"
        id: "deploy"
        uses: "actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e" # v4.0.5
  smoke-test:
    name: "Smoke test"
    needs: "publish"
    if: "needs.publish.result == 'success'"
    runs-on: "ubuntu-24.04"
    timeout-minutes: 10
    permissions: {}
    steps:
      - name: "Install Node.js"
        uses: "actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f" # v6.3.0
        with:
          node-version: "latest"
          check-latest: true
          package-manager-cache: false
      - name: "Wait for npm registry"
        run: |
          version="${GITHUB_REF_NAME#v}"
          for i in {1..10}; do
            if npm view "node-addon-slsa@${version}" version >/dev/null; then
              echo "Version ${version} available on attempt ${i}"
              exit 0
            fi
            echo "Attempt ${i}: not yet available, waiting 15s..."
            sleep 15
          done
          echo "Version ${version} not available after 10 attempts"
          exit 1
      - name: "Smoke test"
        run: |
          cd "$(mktemp -d)"
          npm init -y
          npm install "node-addon-slsa@${GITHUB_REF_NAME#v}"
          ./node_modules/.bin/slsa --help | grep "Usage:"
